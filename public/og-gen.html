<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #0a0a0f;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
}
.glow1 {
  position: absolute; width: 600px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%);
  top: -100px; left: -100px;
}
.glow2 {
  position: absolute; width: 500px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(6,182,212,0.25) 0%, transparent 70%);
  bottom: -80px; right: -80px;
}
.grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.content {
  position: relative; z-index: 10;
  padding: 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 24px;
}
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(124,58,237,0.15);
  border: 1px solid rgba(124,58,237,0.4);
  border-radius: 20px;
  padding: 6px 16px;
  color: #a78bfa;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.05em;
  width: fit-content;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: #7c3aed; }
h1 {
  font-size: 96px;
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
p {
  font-size: 30px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  max-width: 700px;
  line-height: 1.4;
}
.url {
  font-size: 20px;
  font-family: monospace;
  color: rgba(124,58,237,0.7);
  margin-top: 8px;
}
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="badge"><div class="dot"></div>2026 AI Tools Directory</div>
    <h1>VibeMarket</h1>
    <p>Discover, compare, and upvote the best AI tools of 2026</p>
    <div class="url">vcindex-2.vercel.app</div>
  </div>
</body>
</html>
